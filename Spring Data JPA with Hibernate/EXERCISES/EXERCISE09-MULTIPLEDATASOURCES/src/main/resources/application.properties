spring.application.name=Exercise09-MultipleDataSources

# Primary Database

spring.datasource.url=jdbc:h2:mem:employeeDB
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Secondary Database

department.datasource.url=jdbc:h2:mem:departmentDB
department.datasource.username=sa
department.datasource.password=
department.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true