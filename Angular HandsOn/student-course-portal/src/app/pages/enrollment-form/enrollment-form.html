<h2>Student Enrollment Form</h2>

<form
#enrollForm="ngForm"

(ngSubmit)="onSubmit(enrollForm)">

<div>

  <label>Student Name</label>

  <input
    type="text"
    name="studentName"
    required
    minlength="3"
    [(ngModel)]="studentName"
    #nameCtrl="ngModel">

  <div *ngIf="nameCtrl.touched">

    <small *ngIf="nameCtrl.errors?.['required']" style="color:red;">
      Name is required.
    </small>

    <small *ngIf="nameCtrl.errors?.['minlength']" style="color:red;">
      Name must be at least 3 characters.
    </small>

  </div>

</div>

<div>

  <label>Student Email</label>

  <input
    type="email"
    name="studentEmail"
    required
    email
    [(ngModel)]="studentEmail"
    #emailCtrl="ngModel">

  <div *ngIf="emailCtrl.touched">

    <small *ngIf="emailCtrl.errors?.['required']" style="color:red;">
      Email is required.
    </small>

    <small *ngIf="emailCtrl.errors?.['email']" style="color:red;">
      Enter a valid email.
    </small>

  </div>

</div>
<div>

  <label>Course ID</label>

  <input
    type="number"
    name="courseId"
    required
    [(ngModel)]="courseId"
    #courseCtrl="ngModel">

  <div *ngIf="courseCtrl.touched">

    <small *ngIf="courseCtrl.errors?.['required']" style="color:red;">
      Course ID is required.
    </small>

  </div>

</div>
<div>

<label>

Preferred Semester

</label>

<select

name="preferredSemester"

[(ngModel)]="preferredSemester">

<option value="Odd">

Odd

</option>

<option value="Even">

Even

</option>

</select>

</div>

<div>

  <label>

    <input
      type="checkbox"
      name="agreeToTerms"
      required
      [(ngModel)]="agreeToTerms"
      #termsCtrl="ngModel">

    I Agree to Terms

  </label>

  <div *ngIf="termsCtrl.touched">

    <small *ngIf="termsCtrl.errors?.['required']" style="color:red;">
      You must agree before submitting.
    </small>

  </div>

</div>
<button

type="submit"

[disabled]="enrollForm.invalid">

Submit

</button>

<button
type="button"
(click)="enrollForm.resetForm()">

Reset

</button>

</form>

<div *ngIf="submitted">

    <h3 style="color:green;">

        Enrollment request submitted successfully!

    </h3>

</div>
