<div class="home">

    <h1>{{ portalName }}</h1>

    <p>
        Manage your courses easily.
    </p>

    <!-- Property Binding -->

    <button

        [disabled]="!isPortalActive"

        (click)="onEnrollClick()">

        Enroll Now

    </button>

    <br><br>

    <p>{{ message }}</p>

    <hr>

    <!-- Two-way Binding -->

    <input

        type="text"

        [(ngModel)]="searchTerm"

        placeholder="Search Course">

    <p>

        Searching for:

        {{ searchTerm }}

    </p>

</div>
