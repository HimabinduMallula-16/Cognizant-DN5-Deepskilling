<div

class="card"

appHighlight="lightblue"
[ngClass]="cardClasses"

[ngStyle]="{

'border-left':
course.gradeStatus==='passed'
?'6px solid green'
:course.gradeStatus==='failed'
?'6px solid red'
:'6px solid gray'

}">

<h3>{{course.name}}</h3>

<p>Code : {{course.code}}</p>

<p>

Credits :

{{course.credits | creditLabel}}

</p>

<div [ngSwitch]="course.gradeStatus">

<span
*ngSwitchCase="'passed'"
class="passed">

Passed

</span>

<span
*ngSwitchCase="'failed'"
class="failed">

Failed

</span>

<span
*ngSwitchDefault
class="pending">

Pending

</span>

</div>

<br>

<button
(click)="enroll()">

Enroll

</button>

<button
(click)="toggleDetails()">

Show Details

</button>

<div *ngIf="isExpanded">

<p>

Course Code :
{{course.code}}

</p>

<p>

Credits :
{{course.credits}}

</p>

</div>

</div>
